services:
  postgres:
    image: postgres:16
    container_name: tickets_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tickets_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: tickets_redis
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: tickets_backend
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/tickets_db?schema=public
      JWT_SECRET: CLAVESECRETA
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data: